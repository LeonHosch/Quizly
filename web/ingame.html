<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="./quizly.css">
        <script src="./ingame.js" defer></script>
        <title>Quizly</title>
    </head>
    <body>
        <header>
            <img src="./files/logo.png" alt="Quizly Logo" width="100px" height="100px"/>
        </header>
        <main>
            <div>
                <div class="questions">
                    <div class="answer center">
                        <button class="btn_answer green" id="answerOne">Answer 1</button>
                    </div>
                    <div class="answer center">

                    </div>
                    <div class="answer center">

                    </div>
                    <div class="answer center">

                    </div>
                </div>

                <h1 id="lobby"></h1> -->
            </div>
        </main>
