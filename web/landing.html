<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="./landing.css">
        <title>Quizly</title>
    </head>
    <body>
        <header>
            <img src="./files/logo.png" alt="Quizly Logo" width="100px" height="100px"/>
            <h1>The open source quiz game</h1>
        </header>
        <main>
            <div class="bubble large">
                <div class="separator">
                    <div id="avatar_picture">
                        <img src="./files/avatar.png" alt="Avatar Aang" class="main_pfp">
                    </div>
                    <div id="textandbox">
                        <b class="text_medium">Choose your Avatar and Name</b>
                        <input type="text" class="name_select" maxlength="16" placeholder="Username">
                    </div>
                </div>
                <div class="center">
                    <button>Play</button>
                </div>
            </div>
            <div class="bubble medium">
            </div>
            <div class="bubble medium">
            </div>
        </main>
    </body>
</html>
